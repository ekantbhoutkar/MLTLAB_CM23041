<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LabAssignment3 - RNN vs Dense</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial; }
.container { display: flex; gap: 40px; margin-top: 20px; }
.box {
    border: 1px solid #ccc;
    padding: 20px;
    width: 300px;
}
</style>

</head>
<body>

<h2>LabAssignment3: RNN vs Dense Sentiment Comparison</h2>

<button onclick="startTraining()">Train & Compare</button>

<div class="container">

    <div class="box">
        <h3>Dense Network</h3>
        <h2 id="denseAcc">--%</h2>
        <p>Flatten → Dense(32) → Sigmoid</p>
    </div>

    <div class="box">
        <h3>RNN Network</h3>
        <h2 id="rnnAcc">--%</h2>
        <p>Embedding → SimpleRNN → Sigmoid</p>
    </div>

</div>

<script>

let texts = [];
let labels = [];
let wordIndex = {};
let vocabSize;

const MAX_LEN = 100;
const MAX_SAMPLES = 300;

async function startTraining() {

    // reset
    texts = [];
    labels = [];
    wordIndex = {};

    console.log("Loading CSV...");

    Papa.parse("IMDB Dataset.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,

        complete: async function(results) {

            results.data.slice(0, MAX_SAMPLES).forEach(row => {

                if(row.review && row.sentiment){
                    texts.push(row.review.toLowerCase());
                    labels.push(row.sentiment === "positive" ? 1 : 0);
                }

            });

            console.log("Samples:", texts.length);

            await trainModels();
        },

        error: function(err){
            console.error("CSV Error:", err);
        }
    });
}

function buildVocab() {

    let index = 1;

    texts.forEach(text => {
        text.split(/\W+/).forEach(word => {
            if(word && !wordIndex[word]){
                wordIndex[word] = index++;
            }
        });
    });

    vocabSize = index;
}

function encode(texts) {

    return texts.map(text => {

        let seq = text.split(/\W+/).map(w => wordIndex[w] || 0);

        if(seq.length > MAX_LEN) seq = seq.slice(0, MAX_LEN);

        while(seq.length < MAX_LEN) seq.push(0);

        return seq;
    });
}

async function trainModels() {

    buildVocab();

    const xs = tf.tensor2d(encode(texts));
    const ys = tf.tensor2d(labels, [labels.length, 1]);

    // ================= DENSE MODEL =================
    console.log("Training Dense...");

    const denseModel = tf.sequential();

    denseModel.add(tf.layers.flatten({inputShape:[MAX_LEN]}));
    denseModel.add(tf.layers.dense({units:32, activation:'relu'}));
    denseModel.add(tf.layers.dense({units:1, activation:'sigmoid'}));

    denseModel.compile({
        optimizer:'adam',
        loss:'binaryCrossentropy',
        metrics:['accuracy']
    });

    const denseHistory = await denseModel.fit(xs, ys, {
        epochs:5,
        batchSize:16,
        validationSplit:0.2
    });

    const denseAcc = denseHistory.history.accuracy?.slice(-1)[0] || 0;

    document.getElementById("denseAcc").innerText =
        (denseAcc*100).toFixed(2) + "%";


    // ================= RNN MODEL =================
    console.log("Training RNN...");

    const rnnModel = tf.sequential();

    rnnModel.add(tf.layers.embedding({
        inputDim: vocabSize,
        outputDim: 16,
        inputLength: MAX_LEN
    }));

    rnnModel.add(tf.layers.simpleRNN({units:32}));

    rnnModel.add(tf.layers.dense({units:1, activation:'sigmoid'}));

    rnnModel.compile({
        optimizer:'adam',
        loss:'binaryCrossentropy',
        metrics:['accuracy']
    });

    const rnnHistory = await rnnModel.fit(xs, ys, {
        epochs:5,
        batchSize:16,
        validationSplit:0.2
    });

    const rnnAcc = rnnHistory.history.accuracy?.slice(-1)[0] || 0;

    document.getElementById("rnnAcc").innerText =
        (rnnAcc*100).toFixed(2) + "%";

    console.log("Done!");
}

</script>

</body>
</html>
