<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pose Tracking with MediaPipe</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<style>
body {
  text-align: center;
  font-family: monospace;
  background: #0f172a;
  color: #e2e8f0;
}

h2 {
  color: #38bdf8;
}

#wrapper {
  position: relative;
  width: 720px;
  margin: auto;
  border: 1px solid #1e293b;
}

video {
  display: none;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
}

#info {
  margin-top: 10px;
  font-size: 0.85rem;
  color: #94a3b8;
}
</style>
</head>

<body>

<h2>Real-Time Pose Tracking</h2>

<div id="wrapper">
  <video id="inputVideo" width="720" height="540"></video>
  <canvas id="outputCanvas" width="720" height="540"></canvas>
</div>

<p id="info">Initializing camera...</p>

<script>
const inputVideo = document.getElementById("inputVideo");
const outputCanvas = document.getElementById("outputCanvas");
const ctx = outputCanvas.getContext("2d");
const info = document.getElementById("info");

// Create pose detector
const detector = new Pose({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

// Configuration (same accuracy, different formatting)
detector.setOptions({
  modelComplexity: 2,
  smoothLandmarks: true,
  minDetectionConfidence: 0.75,
  minTrackingConfidence: 0.75
});

// Handle results
detector.onResults(res => {
  ctx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);

  // Draw video frame
  ctx.drawImage(res.image, 0, 0, outputCanvas.width, outputCanvas.height);

  if (res.poseLandmarks) {

    // Skeleton
    drawConnectors(ctx, res.poseLandmarks, POSE_CONNECTIONS, {
      color: "#22c55e",
      lineWidth: 3
    });

    // Joints
    drawLandmarks(ctx, res.poseLandmarks, {
      color: "#ef4444",
      radius: 4
    });

    // Bounding box (different logic style)
    let xVals = [], yVals = [];

    res.poseLandmarks.forEach(p => {
      xVals.push(p.x * outputCanvas.width);
      yVals.push(p.y * outputCanvas.height);
    });

    const left = Math.min(...xVals);
    const top = Math.min(...yVals);
    const width = Math.max(...xVals) - left;
    const height = Math.max(...yVals) - top;

    ctx.strokeStyle = "#38bdf8";
    ctx.lineWidth = 2;
    ctx.strokeRect(left, top, width, height);
  }
});

// Camera setup
const cam = new Camera(inputVideo, {
  onFrame: async () => {
    await detector.send({ image: inputVideo });
  },
  width: 720,
  height: 540
});

cam.start();
info.textContent = "Camera running...";
</script>

</body>
</html>
