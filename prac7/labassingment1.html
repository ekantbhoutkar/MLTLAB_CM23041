<!DOCTYPE html>
<html>
<head>
    <title>Assignment 1 - Linear Model</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
    <style>
        body { 
            font-family: Verdana; 
            background: linear-gradient(120deg, #5f9cff, #8e44ad); 
            color: #fff; 
            text-align: center; 
            padding: 40px; 
        }
        button { 
            padding: 18px 35px; 
            font-size: 18px; 
            background: #2ecc71; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
        }
        button:hover { background: #27ae60; }
        #output {
            margin-top: 25px;
            padding: 25px;
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
            font-family: monospace;
            max-width: 650px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

<h1>📊 Assignment 1: Linear Regression Model</h1>
<button onclick="startTraining()">▶ Start Training</button>

<div id="output">Click the button to begin...</div>

<script>
async function startTraining() {

    const output = document.getElementById("output");
    output.innerHTML = "🔄 Preparing dataset...";

    try {
        // Generate dataset
        let inputArr = [];
        let labelArr = [];

        for (let i = 0; i < 50; i++) {
            let val = (i / 10) - 2;
            let result = 3 * val + 1 + (Math.random() - 0.5) * 0.4;

            inputArr.push([val]);
            labelArr.push([result]);
        }

        const inputTensor = tf.tensor2d(inputArr);
        const labelTensor = tf.tensor2d(labelArr);

        output.innerHTML += "<br>✅ Data ready";

        // Create model
        const model = tf.sequential();
        model.add(tf.layers.dense({ units: 1, inputShape: [1] }));

        model.compile({
            optimizer: tf.train.sgd(0.025),
            loss: "meanSquaredError"
        });

        output.innerHTML += "<br>✅ Model initialized";

        // Train model
        output.innerHTML += "<br>⏳ Training model...";
        await model.fit(inputTensor, labelTensor, {
            epochs: 90,
            shuffle: true
        });

        output.innerHTML += "<br>✅ Training complete";

        // Test prediction
        const sample = tf.tensor2d([[1.5]]);
        const pred = model.predict(sample);
        const predVal = await pred.data();

        // Evaluate loss
        const evalLoss = await model.evaluate(inputTensor, labelTensor);
        const lossVal = await evalLoss.data();

        // Save model
        await model.save("localstorage://linear-model-demo");

        // Extract weights
        const params = model.layers[0].getWeights();
        const w = await params[0].data();
        const b = await params[1].data();

        output.innerHTML = `
            🎉 <b>Training Successful!</b><br><br>
            📌 Learned equation: y ≈ ${w[0].toFixed(2)}x + ${b[0].toFixed(2)}<br>
            🔍 Prediction for x=1.5 → ${predVal[0].toFixed(2)}<br>
            📉 Loss: ${lossVal[0].toFixed(4)}<br>
            💾 Model stored in LocalStorage<br><br>
            ✅ Ready for next assignment
        `;

        // Cleanup
        inputTensor.dispose();
        labelTensor.dispose();
        sample.dispose();
        pred.dispose();
        evalLoss.dispose();

    } catch (err) {
        output.innerHTML = `❌ Error: ${err.message}`;
        console.error(err);
    }
}
</script>

</body>
</html>
